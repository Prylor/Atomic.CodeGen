name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  PROJECT: src/Atomic.CodeGen/Atomic.CodeGen.csproj
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build ${{ env.PROJECT }} --configuration Release

      - name: Pack
        run: dotnet pack ${{ env.PROJECT }} --configuration Release --no-build --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            artifact: atomic-codegen-win-x64.zip
          - name: Windows ARM64
            os: windows-latest
            rid: win-arm64
            artifact: atomic-codegen-win-arm64.zip
          - name: Linux x64
            os: ubuntu-latest
            rid: linux-x64
            artifact: atomic-codegen-linux-x64.tar.gz
          - name: Linux ARM64
            os: ubuntu-latest
            rid: linux-arm64
            artifact: atomic-codegen-linux-arm64.tar.gz
          - name: macOS x64
            os: macos-latest
            rid: osx-x64
            artifact: atomic-codegen-osx-x64.tar.gz
          - name: macOS ARM64
            os: macos-latest
            rid: osx-arm64
            artifact: atomic-codegen-osx-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish self-contained
        run: >
          dotnet publish ${{ env.PROJECT }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./publish

      - name: Archive (Windows)
        if: startsWith(matrix.rid, 'win')
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ${{ matrix.artifact }}

      - name: Archive (Linux/macOS)
        if: "!startsWith(matrix.rid, 'win')"
        run: tar -czf ${{ matrix.artifact }} -C ./publish .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
